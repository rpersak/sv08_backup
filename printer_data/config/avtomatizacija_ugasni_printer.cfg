[gcode_shell_command ha_poweroff_on]
command: curl -s -X POST http://192.168.3.222:8123/api/services/input_boolean/turn_on -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiIzYTVlMWY5MzAyYzA0NjRhODRiZDU3Yjg5Yzk3MjViZCIsImlhdCI6MTc3ODU2ODY1NywiZXhwIjoyMDkzOTI4NjU3fQ.SuaABrCmjbpfJtnGHh7Cr098NW3-5TkO4vd68PMoJuQ" -H "Content-Type: application/json" -d '{"entity_id": "input_boolean.sv08_auto_poweroff"}'
timeout: 10
verbose: false

[gcode_shell_command ha_poweroff_off]
command: curl -s -X POST http://192.168.3.222:8123/api/services/input_boolean/turn_off -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiIzYTVlMWY5MzAyYzA0NjRhODRiZDU3Yjg5Yzk3MjViZCIsImlhdCI6MTc3ODU2ODY1NywiZXhwIjoyMDkzOTI4NjU3fQ.SuaABrCmjbpfJtnGHh7Cr098NW3-5TkO4vd68PMoJuQ" -H "Content-Type: application/json" -d '{"entity_id": "input_boolean.sv08_auto_poweroff"}'
timeout: 10
verbose: false

[delayed_gcode AUTO_POWEROFF_INIT]
initial_duration: 2
gcode:
    RUN_SHELL_COMMAND CMD=ha_poweroff_on
    { action_respond_info("Auto poweroff: VKLOPLJEN (default)") }

[gcode_macro AUTO_POWEROFF_ON]
description: Auto poweroff IZKLOPLJEN - klikni za VKLOP
gcode:
    { action_respond_info("Auto poweroff: VKLOPLJEN") }
    RUN_SHELL_COMMAND CMD=ha_poweroff_on

[gcode_macro AUTO_POWEROFF_OFF]
description: Auto poweroff VKLOPLJEN - klikni za IZKLOP
gcode:
    { action_respond_info("Auto poweroff: IZKLOPLJEN") }
    RUN_SHELL_COMMAND CMD=ha_poweroff_off
