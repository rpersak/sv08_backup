[include mainsail.cfg]
[include get_ip.cfg]
[include menu.cfg]
[include timelapse.cfg]
[include Macro.cfg]
[include pid_profiles.cfg]
[include avtomatizacija_ugasni_printer.cfg]
[include shell_command.cfg]
[include plr.cfg]
# [include KAMP_Settings.cfg]  # Uncomment after KAMP is set up

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_36FFD9054755303944691357-if00 #/dev/serial/by-path/platform-5200400.usb-usb-0:1:1.0
restart_method: command

[mcu extra_mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_57FF6C067172515043431187-if00 #/dev/serial/by-path/platform-5101400.usb-usb-0:1:1.0
restart_method: command

[exclude_object]

[temperature_sensor Host_temp]
sensor_type: temperature_host
min_temp: 0
max_temp: 115

[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[pause_resume]

[printer]
kinematics: corexy
max_velocity: 700
max_accel: 40000
minimum_cruise_ratio: 0.5
max_z_velocity: 20
max_z_accel: 500
square_corner_velocity: 5.0

[input_shaper]
damping_ratio_x: 0.001
damping_ratio_y: 0.001
shaper_type_x: mzv
shaper_freq_x: 35
shaper_type_y: mzv
shaper_freq_y: 35

# Uncomment to run input shaper measurements
[adxl345]
cs_pin: extra_mcu:PB12
axes_map: x,z,y

[resonance_tester]
accel_chip: adxl345
probe_points: 175, 175, 30
accel_per_hz: 50
min_freq: 20
max_freq: 133
max_smoothing: 0.2
hz_per_sec: 0.5

[probe_eddy_current eddy]
sensor_type: ldc1612
i2c_mcu: extra_mcu
#i2c_bus: i2c1
i2c_software_scl_pin: extra_mcu:PB6
i2c_software_sda_pin: extra_mcu:PB7
x_offset: -16.43
y_offset: 10.22
max_sensor_hz: 10000000
descend_z: 3.0

[homing_override]
gcode:
    {% if not 'Z' in params and not 'Y' in params and 'X' in params %}
      G90
      G0 Z5 F300
      G28 X
      G0 X348 F1200
    {% elif not 'Z' in params and not 'X' in params and 'Y' in params %}
      G90
      G0 Z5 F300
      G28 Y
      G0 Y360 F1200
    {% elif not 'Z' in params and 'X' in params and 'Y' in params %}
      G90
      G0 Z5 F300
      G28 Y
      G0 Y360 F1200
      G4 P2000
      M400
      G28 X
      G0 X348 F1200
    {% elif 'Z' in params and not 'X' in params and not 'Y' in params %}
      G90
      G0 X191 Y165 F3600
      G28 Z
      G0 Z10 F600
    {% else %}
      G90
      G0 Z5 F300
      G28 Y
      G0 Y360 F1200
      G4 P2000
      M400
      G28 X
      G0 X348 F1200
      G90
      G0 X191 Y165 F3600
      G28 Z
      G0 Z10 F600
    {% endif %}
axes: xyz
set_position_z: 0

[bed_mesh]
speed: 400
horizontal_move_z: 1.5
algorithm: bicubic
mesh_min: 13, 15
mesh_max: 333, 340
probe_count: 41, 41
fade_start: 0
fade_end: 10
scan_overshoot: 4

[quad_gantry_level]
gantry_corners:
    -60, -10
    410, 420
points:
    36, 10
    36, 320
    346, 320
    346, 10
speed: 400
horizontal_move_z: 5
retry_tolerance: 0.05
retries: 5
max_adjust: 10

[stepper_x]
step_pin: PE2
dir_pin: !PE0
enable_pin: !PE3
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: 0
position_endstop: 355
position_max: 355
homing_speed: 30
homing_retract_dist: 0
homing_positive_dir: True

[tmc2209 stepper_x]
uart_pin: PE1
interpolate: True
run_current: 1.1
sense_resistor: 0.150
stealthchop_threshold: 0
uart_address: 3
driver_sgthrs: 70
diag_pin: PE15

[stepper_y]
step_pin: PB8
dir_pin: !PB6
enable_pin: !PB9
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_min: 0
position_endstop: 364
position_max: 364
homing_speed: 30
homing_retract_dist: 0
homing_positive_dir: True

[tmc2209 stepper_y]
uart_pin: PB7
interpolate: True
run_current: 1.1
sense_resistor: 0.150
stealthchop_threshold: 0
uart_address: 3
driver_sgthrs: 70
diag_pin: PE13

[stepper_z]
step_pin: PC0
dir_pin: PE5
enable_pin: !PC1
rotation_distance: 40
gear_ratio: 80:12
microsteps: 16
endstop_pin: probe:z_virtual_endstop
position_max: 347
position_min: -5
homing_speed: 15.0
homing_retract_dist: 5.0
homing_retract_speed: 15.0
second_homing_speed: 10.0

[tmc2209 stepper_z]
uart_pin: PE6
interpolate: True
run_current: 0.55
sense_resistor: 0.150
stealthchop_threshold: 999999
uart_address: 3

[stepper_z1]
step_pin: PD3
dir_pin: !PD1
enable_pin: !PD4
rotation_distance: 40
gear_ratio: 80:12
microsteps: 16

[tmc2209 stepper_z1]
uart_pin: PD2
interpolate: True
run_current: 0.55
sense_resistor: 0.150
stealthchop_threshold: 999999
uart_address: 3

[stepper_z2]
step_pin: PD7
dir_pin: PD5
enable_pin: !PB5
rotation_distance: 40
gear_ratio: 80:12
microsteps: 16

[tmc2209 stepper_z2]
uart_pin: PD6
interpolate: True
run_current: 0.55
sense_resistor: 0.150
stealthchop_threshold: 999999
uart_address: 3

[stepper_z3]
step_pin: PD11
dir_pin: !PD9
enable_pin: !PD12
rotation_distance: 40
gear_ratio: 80:12
microsteps: 16

[tmc2209 stepper_z3]
uart_pin: PD10
interpolate: True
run_current: 0.55
sense_resistor: 0.150
stealthchop_threshold: 999999
uart_address: 3

[thermistor my_thermistor_e]
temperature1: 25
resistance1: 110000
temperature2: 100
resistance2: 7008
temperature3: 220
resistance3: 435

[extruder]
step_pin: extra_mcu:PA8
dir_pin: extra_mcu:PB8
enable_pin: !extra_mcu:PB11
rotation_distance: 6.5
microsteps: 16
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.75
max_extrude_only_distance: 500
heater_pin: extra_mcu:PB9
sensor_type: my_thermistor_e
pullup_resistor: 11500
sensor_pin: extra_mcu:PA5
min_temp: 5
max_temp: 305
max_power: 1.0
min_extrude_temp: 5
control: pid
pid_kp: 33.838
pid_ki: 5.223
pid_kd: 47.752
pressure_advance: 0.025
pressure_advance_smooth_time: 0.035

[tmc2209 extruder]
uart_pin: extra_mcu:PB10
interpolate: True
run_current: 0.8
uart_address: 3
sense_resistor: 0.150

[verify_heater extruder]
max_error: 120
check_gain_time: 30
hysteresis: 5
heating_gain: 2

[filament_switch_sensor filament_sensor]
pause_on_runout: True
event_delay: 3.0
pause_delay: 0.5
switch_pin: PE9

[thermistor my_thermistor]
temperature1: 25
resistance1: 100000
temperature2: 50
resistance2: 18085.4
temperature3: 100
resistance3: 5362.6

[heater_bed]
heater_pin: PA0
sensor_type: my_thermistor
sensor_pin: PC5
max_power: 1.0
min_temp: 5
max_temp: 115
control: pid
pid_kp: 73.571
pid_ki: 1.820
pid_kd: 783.849

[verify_heater heater_bed]
max_error: 120
check_gain_time: 40
hysteresis: 5
heating_gain: 2

[multi_pin print_cooling_fan_pins]
pins: extra_mcu:PA7, extra_mcu:PB1

# print/part cooling fan
[fan]
pin: multi_pin:print_cooling_fan_pins
max_power: 1.0

[fan_generic exhaust_fan] # exhaust fan
pin: PA2
max_power: 1.0

# MCU fan, aka noisy boi, is now only enabled when using steppers, extruder, heatbed; 5min timeout
[controller_fan MCU_fan]
pin: PA1
max_power: 1
kick_start_time: 0.5
fan_speed: 1
idle_timeout: 300
heater: extruder, heater_bed
stepper: stepper_x, stepper_y

[heater_fan hotend_fan]      
pin: extra_mcu:PA6   
max_power: 1.0               
kick_start_time: 0.5         
heater: extruder             
heater_temp: 50              
tachometer_pin:extra_mcu:PA1
tachometer_ppr: 1
tachometer_poll_interval: 0.0013

[gcode_arcs]                       
resolution: 1.0                    


[output_pin main_led]
pin: PA3
pwm: True
value: 1
cycle_time: 0.010

[board_pins]
aliases:
    EXP1_1=PA8,   EXP1_2=PC9,
    EXP1_3=PA10,  EXP1_4=PA9,
    EXP1_5=PC11,  EXP1_6=PC10,
    EXP1_7=PD8,   EXP1_8=PC12,
    EXP1_9=<GND>, EXP1_10=<5V>,
    EXP2_1=PB14,  EXP2_2=PB13,
    EXP2_3=PC7,   EXP2_4=PB12,
    EXP2_5=PC6,   EXP2_6=PB15,
    EXP2_7=PC8,   EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<5V>

[display]
lcd_type: uc1701
cs_pin: EXP1_3
a0_pin: EXP1_4
rst_pin: EXP1_5
encoder_pins: ^EXP2_5, ^EXP2_3
click_pin: ^!EXP1_2
contrast: 63
spi_software_miso_pin: EXP2_1
spi_software_mosi_pin: EXP2_6
spi_software_sclk_pin: EXP2_2

[output_pin beeper]
pin: EXP1_1
pwm: False
value: 0

[neopixel Screen_Colour]
pin: EXP1_6
chain_count: 3
color_order: RGB
initial_RED: 0.5
initial_GREEN: 0.4
initial_BLUE: 0.7

[idle_timeout]
gcode: _IDLE_TIMEOUT
timeout: 600

[save_variables]
filename: ~/printer_data/config/saved_variables.cfg

# Requires patched pid_calibrate.py for SET_HEATER_PID command.
# See klipper-pid-profiles repo for the patch.
[pid_calibrate]

[include moonraker_obico_macros.cfg]

