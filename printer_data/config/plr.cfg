[respond]
default_type: echo

# =====================================================================
#  Mainline-native Power-Loss-Recovery (no klippy patch)
#  Recording: PLR_SAVE is called from the slicer layer-change gcode and
#  writes the resume point (Z, file byte offset, temps) into
#  saved_variables.cfg. Resume: RESUME_INTERRUPTED rebuilds a self-
#  contained resume gcode via plr.sh and prints it.
# =====================================================================

# Called once at the end of START_PRINT (already wired in Macro.cfg).
[gcode_macro save_last_file]
gcode:
    {% set filepath = printer.virtual_sdcard.file_path %}
    {% set filename = filepath.split('/') %}
    SAVE_VARIABLE VARIABLE=last_file VALUE='"{ filename[-1] }"'
    SAVE_VARIABLE VARIABLE=filepath VALUE='"{ filepath }"'
    SAVE_VARIABLE VARIABLE=was_interrupted VALUE=True

[gcode_macro clear_last_file]
gcode:
    SAVE_VARIABLE VARIABLE=last_file VALUE='"default"'
    SAVE_VARIABLE VARIABLE=filepath VALUE='"default"'

# Call this every layer from the slicer (Orca: "Before layer change G-code").
# Records the resume point. Cheap enough per-layer on eMMC.
[gcode_macro PLR_SAVE]
description: Record power-loss resume point (call each layer)
gcode:
    {% if printer.virtual_sdcard.is_active %}
        SAVE_VARIABLE VARIABLE=power_resume_z VALUE={printer.gcode_move.gcode_position.z}
        SAVE_VARIABLE VARIABLE=power_resume_pos VALUE={printer.virtual_sdcard.file_position}
        SAVE_VARIABLE VARIABLE=power_resume_bed VALUE={printer.heater_bed.target|int}
        SAVE_VARIABLE VARIABLE=power_resume_ext VALUE={printer.extruder.target|int}
        SAVE_VARIABLE VARIABLE=power_resume_eabs VALUE={printer.gcode_move.absolute_extrude}
        SAVE_VARIABLE VARIABLE=power_resume_e VALUE={printer.gcode_move.gcode_position.e}
    {% endif %}

# Clears the interrupted flag. Called by END_PRINT / CANCEL_PRINT (Macro.cfg).
[gcode_macro PRINT_END]
gcode:
    SAVE_VARIABLE VARIABLE=was_interrupted VALUE=False
    clear_last_file

# Manual "clear PLR state" command.
[gcode_macro G31]
gcode:
    SAVE_VARIABLE VARIABLE=was_interrupted VALUE=False
    clear_last_file
    M118 PLR state cleared.

[gcode_shell_command POWER_LOSS_RESUME]
command: /home/biqu/plr.sh
timeout: 420.

# Run this AFTER power is restored to continue the interrupted print.
[gcode_macro RESUME_INTERRUPTED]
description: Rebuild + start the interrupted print after power loss
gcode:
    {% set svv = printer.save_variables.variables %}
    {% if svv.was_interrupted and svv.last_file != 'default' %}
        M118 Building resume for {svv.last_file} ...
        RUN_SHELL_COMMAND CMD=POWER_LOSS_RESUME
        M118 Resuming {svv.last_file}
        SDCARD_PRINT_FILE FILENAME="plr/{svv.last_file}"
    {% else %}
        M118 No interrupted print to resume.
    {% endif %}
